<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Gaurab Aryal">
    <meta name="description" content="A portfolio website for the showcase of projects and skills.">
    <meta name="keywords" content="portfolio, gaurab aryal, webdesign, cybersecuity, webdevelopment, skill">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Portfolio</title>
</head>

<body>
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>
    <div class="bg-orb-3"></div>
    <header>
        <div class="header-container">
            <div class="logo-content">
                <div class="logo">
                    <a href="index.html">
                        <span>Gaurab</span>
                    </a>
                </div>
            </div>
            <div class="nav-content">
                <nav>
                    <ul class="nav-links">
                        <li><a href="#home">Home</a></li>
                        <li><a href="#about">About</a></li>
                        <li><a href="#projects">Projects</a></li>
                        <li><a href="#contact">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- Home Section -->
    <section class="home" id="home">
        <div class="home-content">
            <div class="primary-container">

                <div class="cloud cloud-1"></div>
                <div class="cloud cloud-2"></div>
                <div class="cloud cloud-3"></div>


                <div class="text-content">
                    <h1 class="name-title">Gaurab Aryal</h1>
                    <p class="tagline">Let's build something amazing together</p>
                </div>

                <div class="social-links">
                    <span>Join Me :</span>
                    <a href="#" class="social-icon">
                        <i class="fa-brands fa-github"></i>
                    </a>
                    <a href="#" class="social-icon">
                        <i class="fa-brands fa-linkedin"></i>
                    </a>
                </div>

                <div class="buttons">

                    <a href="#projects" class="btn btn-primary">View My Work</a>
                    <a href="#contact" class="btn btn-secondary">Get In Touch</a>
                </div>
            </div>

            <div class="secondary-container">
                <div class="orbit-system">
                    <!-- Center Image -->
                    <div class="center-image">

                        <img src="assets/images/main.png" alt="Developer">

                    </div>


                    <!-- Orbiting Skill Circles -->
                    <div class="orbit orbit-1">
                        <div class="skill-circle" data-skill="web">
                            <i class="fa-solid fa-code"></i>
                            <span>Web Dev</span>
                        </div>
                    </div>

                    <div class="orbit orbit-2">
                        <div class="skill-circle" data-skill="security">
                            <i class="fa-solid fa-shield-halved"></i>
                            <span>Cyber Security</span>
                        </div>
                    </div>

                    <div class="orbit orbit-3">
                        <div class="skill-circle" data-skill="ml">
                            <i class="fa-solid fa-brain"></i>
                            <span>Machine Learning</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/js/main.js"></script>
</body>

</html>
